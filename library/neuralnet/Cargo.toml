[package]
name = "neuralnet"
version = "0.1.0"
edition = "2024"
authors = ["Sam Colak <sam@samcolak.com>"]
description = "Neural network library and training utilities for multimodal experiments"
repository = "https://github.com/samcolak/neuron"
readme = "./../readme.md"
keywords = ["neural-networks", "machine-learning", "rust"]
categories = ["science", "algorithms"]

[features]
default = ["optimizer-adam"]
optimizer-adam = []
offloading-cuda = ["dep:cudarc"]
offloading-mlx = ["dep:apple-mlx"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bincode = "1"
uuid = { version = "1.22.0", features = ["serde", "v4", "v7", "fast-rng"] }
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }
csv = "1"
apple-mlx = { path = "vendor/apple-mlx", optional = true }
cudarc = { version = "0.12", optional = true, default-features = false, features = ["driver", "nvrtc", "cuda-12000"] }
